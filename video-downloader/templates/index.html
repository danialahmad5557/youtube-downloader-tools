<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Video Downloader</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f0f; color: #fff;
            min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px;
        }
        .tool-container {
            width: 100%; max-width: 700px; background: #1a1a1a;
            border-radius: 16px; padding: 30px; border: 1px solid #333;
        }
        .tool-header { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; }
        .tool-header i { font-size: 28px; color: #ff0000; }
        .tool-header h1 { font-size: 22px; font-weight: 700; }
        .tool-header span { background: #ff0000; color: #fff; padding: 2px 8px; border-radius: 4px; font-size: 12px; font-weight: 600; }
        .input-group { display: flex; gap: 10px; margin-bottom: 20px; }
        .input-group input { flex: 1; padding: 14px 16px; border-radius: 10px; border: 1px solid #333; background: #252525; color: #fff; font-size: 14px; outline: none; }
        .input-group input:focus { border-color: #ff0000; }
        .input-group input::placeholder { color: #666; }
        .btn { padding: 14px 24px; border-radius: 10px; border: none; background: #ff0000; color: #fff; font-size: 14px; font-weight: 600; cursor: pointer; white-space: nowrap; }
        .btn:hover { background: #cc0000; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .loading { display: none; text-align: center; padding: 40px; }
        .loading i { font-size: 32px; color: #ff0000; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading p { margin-top: 12px; color: #888; }
        .results { display: none; }
        .preview { display: flex; gap: 16px; margin-bottom: 16px; }
        .preview img { width: 200px; border-radius: 10px; flex-shrink: 0; }
        .info { flex: 1; }
        .info h2 { font-size: 18px; margin-bottom: 8px; line-height: 1.4; }
        .info p { color: #aaa; font-size: 14px; margin-bottom: 4px; }
        .info p i { width: 20px; color: #ff0000; }
        table { width: 100%; border-collapse: collapse; margin-top: 12px; }
        th, td { text-align: left; padding: 10px 12px; border-bottom: 1px solid #333; font-size: 14px; }
        th { color: #888; font-weight: 600; font-size: 12px; text-transform: uppercase; }
        td { color: #fff; }
        .download-link { color: #ff0000; text-decoration: none; font-weight: 600; cursor: pointer; }
        .download-link:hover { text-decoration: underline; }
        .error-msg { background: #2d1a1a; border: 1px solid #ff4444; color: #ff6666; padding: 12px; border-radius: 8px; margin-bottom: 16px; font-size: 14px; display: none; }
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #333; color: #fff; padding: 12px 24px; border-radius: 8px; font-size: 14px; display: none; z-index: 999; }
    </style>
</head>
<body>
    <div class="tool-container">
        <div class="tool-header">
            <i class="fa-brands fa-youtube"></i>
            <h1>Video Downloader</h1>
            <span>Tool</span>
        </div>
        <div class="input-group">
            <input type="text" id="url-input" placeholder="Paste YouTube link..." />
            <button class="btn" id="fetch-btn"><i class="fa-solid fa-video"></i> Fetch</button>
        </div>
        <div class="error-msg" id="error-msg"></div>
        <div class="loading" id="loading"><i class="fa-solid fa-spinner"></i><p>Fetching video info...</p></div>
        <div class="results" id="results">
            <div class="preview">
                <img id="thumb-img" src="" alt="Video thumbnail">
                <div class="info">
                    <h2 id="video-title">-</h2>
                    <p><i class="fa-brands fa-youtube"></i> <span id="channel-name">-</span></p>
                    <p><i class="fa-regular fa-clock"></i> <span id="duration">-</span></p>
                    <p><i class="fa-regular fa-eye"></i> <span id="views">-</span></p>
                </div>
            </div>
            <table>
                <thead><tr><th>Quality</th><th>Format</th><th>Size</th><th></th></tr></thead>
                <tbody id="formats-tbody"></tbody>
            </table>
        </div>
        <div class="loading" id="dl-loading" style="display:none;">
            <i class="fa-solid fa-download"></i><p id="dl-status">Starting download...</p>
            <div class="progress-bar" style="width:100%;height:8px;background:#333;border-radius:4px;margin-top:12px;overflow:hidden;">
                <div id="progress-fill" style="width:0%;height:100%;background:#ff0000;border-radius:4px;transition:width .3s;"></div>
            </div>
            <p id="progress-text" style="font-size:12px;color:#888;margin-top:6px;"></p>
        </div>
    </div>
    <div class="toast" id="toast"></div>

    <script>
        function showToast(msg, type) {
            const t = document.getElementById('toast');
            t.textContent = msg; t.style.background = type === 'error' ? '#cc0000' : '#333';
            t.style.display = 'block'; setTimeout(() => t.style.display = 'none', 3000);
        }
        document.getElementById('fetch-btn').addEventListener('click', fetchVideo);
        document.getElementById('url-input').addEventListener('keydown', e => { if (e.key === 'Enter') fetchVideo(); });

        async function fetchVideo() {
            const url = document.getElementById('url-input').value.trim();
            if (!url) return showToast('Enter a YouTube link', 'error');
            document.getElementById('loading').style.display = 'block';
            document.getElementById('results').style.display = 'none';
            document.getElementById('error-msg').style.display = 'none';
            document.getElementById('dl-loading').style.display = 'none';
            try {
                const res = await fetch('/api/video/info', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url })
                });
                const data = await res.json();
                document.getElementById('loading').style.display = 'none';
                if (!data.success) {
                    document.getElementById('error-msg').textContent = data.error || 'Failed';
                    document.getElementById('error-msg').style.display = 'block'; return;
                }
                renderVideo(data);
            } catch(e) {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('error-msg').textContent = 'Network error';
                document.getElementById('error-msg').style.display = 'block';
            }
        }

        function formatBytes(bytes) {
            if (!bytes || bytes === 0) return '-';
            const k = 1024; const sizes = ['Bytes','KB','MB','GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
        }

        function renderVideo(data) {
            document.getElementById('thumb-img').src = data.thumbnail || 'https://img.youtube.com/vi/' + data.video_id + '/hqdefault.jpg';
            document.getElementById('video-title').textContent = data.title;
            document.getElementById('channel-name').textContent = data.channel_name;
            document.getElementById('duration').textContent = data.duration;
            document.getElementById('views').textContent = data.views;
            const tbody = document.getElementById('formats-tbody');
            tbody.innerHTML = '';
            data.options.forEach((opt, idx) => {
                const tr = document.createElement('tr');
                let icon = 'fa-solid fa-video';
                if (opt.key === 'mp3') icon = 'fa-solid fa-music';
                tr.innerHTML = '<td><i class="' + icon + '" style="margin-right:6px;color:#ff0000;"></i>' + opt.name + '</td><td>' + opt.ext.toUpperCase() + '</td><td>' + formatBytes(opt.size_bytes) + '</td><td><button class="download-link" data-idx="' + idx + '" style="background:none;border:none;color:#ff0000;font-weight:600;cursor:pointer;font-size:14px;"><i class="fa-solid fa-download"></i> Download</button></td>';
                tr.querySelector('.download-link').addEventListener('click', () => {
                    downloadVideo(opt.format_selector, opt.ext, data.title);
                });
                tbody.appendChild(tr);
            });
            document.getElementById('results').style.display = 'block';
        }

        function downloadVideo(format, ext, title) {
            const url = document.getElementById('url-input').value.trim();
            document.getElementById('dl-loading').style.display = 'block';
            document.getElementById('dl-status').textContent = 'Starting download...';
            document.getElementById('progress-fill').style.width = '0%';
            document.getElementById('progress-text').textContent = '';

            // Step 1: Start the backend download
            fetch('/api/video/download/start', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ url, format, ext, title })
            }).then(r => r.json()).then(data => {
                if (!data.success) { throw new Error(data.error || 'Failed to start'); }
                const did = data.download_id;

                // Step 2: Poll status every second
                const poll = setInterval(() => {
                    fetch('/api/video/download/status/' + did).then(r => r.json()).then(s => {
                        if (!s.success) { clearInterval(poll); throw new Error(s.error); }
                        document.getElementById('dl-status').textContent = s.status === 'downloading' ? 'Downloading...' : s.status === 'starting' ? 'Starting...' : s.status === 'processing' ? 'Processing...' : s.status;
                        document.getElementById('progress-fill').style.width = s.progress + '%';
                        document.getElementById('progress-text').textContent = s.progress_text || '';

                        if (s.status === 'completed') {
                            clearInterval(poll);
                            document.getElementById('dl-status').textContent = 'Download complete!';
                            document.getElementById('progress-fill').style.width = '100%';
                            // Step 3: Download the file
                            const a = document.createElement('a');
                            a.href = '/api/video/download/file/' + did;
                            a.download = title.replace(/[^a-z0-9]/gi, '_').substring(0, 50) + '.' + ext;
                            document.body.appendChild(a);
                            a.click();
                            document.body.removeChild(a);
                            setTimeout(() => document.getElementById('dl-loading').style.display = 'none', 2000);
                        } else if (s.status === 'error') {
                            clearInterval(poll);
                            document.getElementById('dl-loading').style.display = 'none';
                            showToast(s.error || 'Download failed', 'error');
                        }
                    }).catch(e => { clearInterval(poll); throw e; });
                }, 1000);
            }).catch(e => {
                document.getElementById('dl-loading').style.display = 'none';
                showToast('Download failed: ' + e.message, 'error');
            });
        }
    </script>
</body>
</html>
